<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG 連結收集器</title>
<link rel="icon" href="data:,">
<style>
  :root {
    --bg: #f6f4f1;
    --panel: #fffdf9;
    --panel-soft: #f0f6f3;
    --text: #202124;
    --muted: #6d716f;
    --line: #ddd8cf;
    --primary: #126f57;
    --primary-hover: #0d5d49;
    --danger: #b42318;
    --shadow: 0 14px 40px rgba(32, 33, 36, .08);
    --radius: 8px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Noto Sans TC", "Helvetica Neue", Arial, sans-serif;
    letter-spacing: 0;
  }

  button, input, textarea, select { font: inherit; }
  button { border: 0; }

  .shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 360px minmax(0, 1fr);
  }

  .side {
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: auto;
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 24px;
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
  }

  .brand h1 {
    margin: 0;
    font-size: 24px;
    line-height: 1.2;
    font-weight: 760;
  }

  .brand span {
    display: block;
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
  }

  .counter {
    width: 54px;
    height: 54px;
    flex: 0 0 54px;
    border-radius: 50%;
    background: var(--panel-soft);
    color: var(--primary);
    display: grid;
    place-items: center;
    font-weight: 760;
    border: 1px solid #cfe1da;
  }

  .quick-capture {
    display: grid;
    gap: 14px;
    padding: 16px;
    background: var(--panel-soft);
    border: 1px solid #d2e3dc;
    border-radius: var(--radius);
    margin-bottom: 0;
  }

  .capture-actions {
    align-items: stretch;
  }

  .quick-capture h2 {
    margin: 0;
    font-size: 16px;
    line-height: 1.4;
  }

  .quick-capture p, .help {
    margin: 0;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.55;
  }

  .input, .textarea, .select {
    width: 100%;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--text);
    border-radius: var(--radius);
    padding: 11px 12px;
    outline: none;
    min-height: 42px;
  }

  .textarea {
    min-height: 108px;
    resize: vertical;
    line-height: 1.5;
  }

  .input:focus, .textarea:focus, .select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(18, 111, 87, .12);
  }

  .btn-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    min-height: 42px;
    padding: 10px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-weight: 680;
    transition: background .16s, border-color .16s, transform .16s;
    white-space: nowrap;
    text-decoration: none;
  }

  .btn:active { transform: translateY(1px); }
  .btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  .btn-primary {
    background: var(--primary);
    color: #fff;
  }

  .btn-primary:hover { background: var(--primary-hover); }

  .btn-secondary {
    background: #fff;
    color: var(--text);
    border: 1px solid var(--line);
  }

  .btn-secondary:hover { background: #f7f7f5; }

  .btn-danger {
    background: #fff5f3;
    color: var(--danger);
    border: 1px solid #f0c7c0;
  }

  .btn-icon {
    width: 38px;
    height: 38px;
    min-height: 38px;
    padding: 0;
    flex: 0 0 38px;
  }

  #manageCategoriesBtn {
    width: auto;
    min-width: 56px;
    padding: 0 12px;
  }

  #hideDoneBtn {
    width: auto;
    min-width: 92px;
    padding: 0 12px;
  }

  #hideDoneBtn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  .side-note {
    border-top: 1px solid var(--line);
    margin-top: 18px;
    padding-top: 16px;
    display: grid;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }

  .main {
    min-width: 0;
    padding: 24px;
  }

  .topbar {
    display: grid;
    grid-template-columns: minmax(220px, 1fr) minmax(160px, 210px) minmax(160px, 210px) 150px auto;
    gap: 10px;
    align-items: center;
    margin-bottom: 18px;
  }

  .filter-toggle {
    width: 100%;
    margin-bottom: 10px;
  }

  .topbar.collapsed {
    display: none;
  }

  .toolbar-actions {
    min-width: 0;
  }

  .multi-filter {
    position: relative;
  }

  .filter-trigger {
    width: 100%;
    min-height: 42px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--text);
    border-radius: var(--radius);
    padding: 10px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-weight: 650;
    text-align: left;
  }

  .filter-trigger:focus-visible {
    outline: 0;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(18, 111, 87, .12);
  }

  .filter-menu {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    z-index: 12;
    display: none;
    padding: 8px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    max-height: 260px;
    overflow: auto;
  }

  .multi-filter.open .filter-menu {
    display: grid;
    gap: 6px;
  }

  .filter-option {
    width: 100%;
    border-radius: 7px;
    padding: 9px 10px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    text-align: left;
  }

  .filter-option:hover {
    background: #f7f7f5;
  }

  .filter-option.active {
    background: #e5f2ed;
    color: var(--primary);
    font-weight: 700;
  }

  .filter-check {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 1px solid var(--line);
    display: grid;
    place-items: center;
    flex: 0 0 20px;
    color: #fff;
    background: #fff;
    font-size: 13px;
  }

  .filter-option.active .filter-check {
    background: var(--primary);
    border-color: var(--primary);
  }

  .board {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .card {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: 0 10px 22px rgba(41, 37, 31, .06);
    overflow: hidden;
    display: grid;
    min-height: 168px;
  }

  .thumb {
    width: 100%;
    aspect-ratio: 4 / 5;
    background: #efe9df;
    border-bottom: 1px solid var(--line);
    overflow: hidden;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-head {
    min-height: 0;
    padding: 16px 54px 8px 16px;
    background: linear-gradient(135deg, #fffdf9 0%, #f4faf7 100%);
    display: grid;
    gap: 9px;
    text-align: left;
  }

  .card-title {
    margin: 0;
    font-size: 18px;
    line-height: 1.28;
    font-weight: 820;
    overflow-wrap: anywhere;
  }

  .title-edit-trigger {
    width: 100%;
    padding: 0;
    background: transparent;
    color: inherit;
    cursor: text;
    display: block;
    text-align: left;
    font: inherit;
    font-weight: inherit;
    line-height: inherit;
    overflow-wrap: anywhere;
  }

  .title-edit-input {
    width: 100%;
    border: 1px solid var(--primary);
    border-radius: 7px;
    padding: 8px 9px;
    background: #fff;
    color: var(--text);
    font: inherit;
    font-weight: inherit;
    line-height: inherit;
    outline: none;
    box-shadow: 0 0 0 3px rgba(18, 111, 87, .12);
  }

  .meta {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-wrap: wrap;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    border-radius: 999px;
    padding: 4px 9px;
    font-size: 12px;
    font-weight: 650;
    background: #edf2f7;
    color: #4a5568;
  }

  .badge-button {
    border: 0;
    cursor: pointer;
  }

  .badge-select {
    height: 24px;
    min-height: 24px;
    border: 1px solid #cfe1da;
    border-radius: 999px;
    padding: 2px 8px;
    background: #fff;
    color: var(--primary);
    font-size: 12px;
    font-weight: 650;
    line-height: 1;
    outline: none;
    vertical-align: top;
  }

  .badge.category { background: #e5f2ed; color: var(--primary); }
  .badge.todo { background: #fff1df; color: #9a4d00; }
  .badge.done { background: #e8f5ea; color: #206b35; }
  .badge.raw { background: #f2eeea; color: #75685d; }

  .card-body {
    padding: 0 16px 14px;
    display: grid;
    gap: 10px;
  }

  .note {
    color: #464a48;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 25px;
  }

  .tag {
    color: #5e4936;
    background: #f3e8dc;
    border-radius: 999px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
  }

  .tag-add {
    background: #fff;
    border: 1px dashed #d3c8bc;
    color: var(--primary);
    min-width: 26px;
    justify-content: center;
  }

  .inline-tag-editor {
    position: relative;
    display: grid;
    gap: 9px;
    padding: 10px 38px 10px 10px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
  }

  .inline-tag-close {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 24px;
    height: 24px;
    min-height: 24px;
    border-radius: 999px;
    padding: 0;
    font-size: 13px;
  }

  .inline-tag-options {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .inline-tag-input {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }

  .inline-tag-input .input {
    min-height: 36px;
    padding: 7px 10px;
    font-size: 14px;
  }

  .inline-tag-input .btn {
    min-height: 36px;
    padding: 7px 11px;
    font-size: 13px;
  }

  .card-actions {
    display: grid;
    grid-template-columns: 1fr 42px;
    gap: 8px;
    align-items: center;
    margin-top: 2px;
  }

  .card-actions .btn {
    min-height: 38px;
    padding: 8px 10px;
    font-size: 13px;
  }

  .copy-float {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 2;
    width: 32px;
    height: 32px;
    min-height: 32px;
    padding: 0;
    background: rgba(255, 255, 255, .86);
    backdrop-filter: blur(8px);
  }

  .organize-btn {
    width: 42px;
    min-width: 42px;
    padding: 0;
    font-size: 18px;
  }

  .empty {
    min-height: 360px;
    border: 1px dashed #cfc8bd;
    border-radius: var(--radius);
    display: grid;
    place-items: center;
    text-align: center;
    padding: 30px;
    color: var(--muted);
    background: rgba(255, 253, 249, .62);
  }

  .empty h2 {
    color: var(--text);
    margin: 0 0 8px;
    font-size: 22px;
  }

  .empty p {
    margin: 0;
    line-height: 1.6;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 20;
    background: rgba(32, 33, 36, .42);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    width: min(620px, 100%);
    max-height: 92vh;
    overflow: auto;
    background: var(--panel);
    border-radius: 12px;
    box-shadow: 0 24px 80px rgba(0, 0, 0, .22);
  }

  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 20px 20px 0;
  }

  .modal-head h2 {
    margin: 0;
    font-size: 20px;
    line-height: 1.35;
  }

  .modal-body {
    display: grid;
    gap: 14px;
    padding: 20px;
  }

  .manager-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .manager-tabs .btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  .field {
    display: grid;
    gap: 7px;
  }

  .field label {
    font-size: 13px;
    font-weight: 650;
    color: #333735;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .manager-list,
  .category-list {
    display: grid;
    gap: 8px;
  }

  .category-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    min-height: 44px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
  }

  .tag-editor {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag-choice {
    min-height: 34px;
    padding: 6px 8px 6px 11px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: #fff;
    color: var(--text);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 650;
  }

  .tag-choice.active {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  .tag-remove {
    width: 20px;
    height: 20px;
    border-radius: 999px;
    background: rgba(255, 255, 255, .22);
    color: inherit;
    display: inline-grid;
    place-items: center;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
  }

  .tag-choice:not(.active) .tag-remove {
    background: #fff5f3;
    color: var(--danger);
  }

  .category-name {
    font-weight: 650;
    overflow-wrap: anywhere;
  }

  .category-count {
    color: var(--muted);
    font-size: 12px;
    margin-left: auto;
  }

  .manager-empty {
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 14px;
    color: var(--muted);
    text-align: center;
  }

  .toast {
    position: fixed;
    right: 22px;
    bottom: 22px;
    background: #202124;
    color: #fff;
    padding: 12px 15px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
    transition: opacity .18s, transform .18s;
    z-index: 30;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  .hidden { display: none; }

  @media (max-width: 900px) {
    .shell {
      display: block;
      min-height: auto;
    }
    .side {
      position: static;
      height: auto;
      border-right: 0;
      border-bottom: 1px solid var(--line);
      padding: 18px;
    }
    .quick-capture {
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 12px;
    }
    .quick-capture .input {
      min-height: 46px;
    }
    .capture-actions {
      flex-wrap: nowrap;
    }
    .topbar { grid-template-columns: minmax(0, 1fr) minmax(160px, 1fr); }
    .toolbar-actions {
      grid-column: 1 / -1;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
    }
    .toolbar-actions .btn {
      flex: 0 0 auto;
    }
  }

  @media (max-width: 560px) {
    body {
      background: var(--panel);
    }
    .side {
      padding: 12px;
      background: var(--panel);
    }
    .main {
      padding: 12px;
    }
    .brand { align-items: flex-start; }
    .quick-capture {
      grid-template-columns: 1fr;
      padding: 12px;
      border-radius: 10px;
    }
    .capture-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .capture-actions .btn {
      min-height: 48px;
      padding: 10px 16px;
    }
    .row, .topbar {
      grid-template-columns: 1fr;
    }
    .topbar {
      gap: 8px;
      margin-bottom: 12px;
    }
    .topbar .input,
    .topbar .select,
    .filter-trigger {
      min-height: 48px;
      font-size: 16px;
    }
    .toolbar-actions {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      margin: 0 -12px;
      padding: 0 12px 4px;
      scrollbar-width: none;
    }
    .toolbar-actions::-webkit-scrollbar {
      display: none;
    }
    #hideDoneBtn,
    #manageCategoriesBtn {
      min-width: max-content;
      height: 44px;
    }
    .multi-filter.open .filter-menu {
      position: static;
      margin-top: 6px;
      max-height: 220px;
      box-shadow: none;
    }
    .filter-option {
      min-height: 44px;
      font-size: 15px;
    }
    .board {
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .card {
      min-height: 0;
      box-shadow: none;
    }
    .thumb {
      aspect-ratio: 16 / 10;
    }
    .card-head {
      min-height: auto;
      padding: 15px 52px 8px 14px;
    }
    .card-title {
      font-size: 18px;
    }
    .card-body {
      padding: 0 14px 14px;
      gap: 10px;
    }
    .note {
      font-size: 13px;
    }
    .card-actions {
      grid-template-columns: 1fr 42px;
      gap: 6px;
    }
    .card-actions .btn {
      min-height: 38px;
      padding: 7px 8px;
      font-size: 13px;
    }
    .card-actions .btn-icon {
      width: 42px;
      flex: initial;
    }
    .empty {
      min-height: 300px;
      padding: 24px 18px;
    }
    .empty h2 {
      font-size: 20px;
    }
    .empty p {
      font-size: 14px;
    }
    .modal-backdrop {
      align-items: flex-end;
      padding: 0;
    }
    .modal {
      width: 100%;
      max-height: 92vh;
      border-radius: 16px 16px 0 0;
    }
    .modal-head {
      padding: 16px 16px 0;
    }
    .modal-body {
      padding: 16px;
      gap: 12px;
    }
    .modal-body .btn-row {
      align-items: stretch;
      flex-wrap: wrap;
    }
    .modal-body .btn-row .btn,
    .modal-body .btn-row .input {
      min-height: 46px;
    }
    .category-row {
      min-height: 48px;
    }
  }
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="counter hidden" id="totalCount">0</div>
    <form class="quick-capture" id="linkForm">
      <input class="input" id="urlInput" type="text" placeholder="貼上 Instagram 連結" autocomplete="off" required>
      <div class="btn-row capture-actions">
        <button class="btn btn-primary" type="submit">保存</button>
        <button class="btn btn-secondary btn-icon hidden" type="button" id="resetBtn" title="清空">x</button>
      </div>
    </form>
  </aside>

  <main class="main">
    <button class="btn btn-secondary filter-toggle" type="button" id="filterToggle" aria-label="展開篩選" title="展開篩選" aria-expanded="false">⌄</button>
    <div class="topbar collapsed" id="filterPanel">
      <input class="input" id="searchInput" type="search" placeholder="搜尋標題、分類、備註">
      <div class="multi-filter" id="categoryFilter">
        <button class="filter-trigger" type="button" id="categoryFilterButton" aria-expanded="false">
          <span id="categoryFilterLabel">全部分類</span>
          <span>⌄</span>
        </button>
        <div class="filter-menu" id="categoryFilterOptions"></div>
      </div>
      <div class="multi-filter" id="tagFilter">
        <button class="filter-trigger" type="button" id="tagFilterButton" aria-expanded="false">
          <span id="tagFilterLabel">全部標籤</span>
          <span>⌄</span>
        </button>
        <div class="filter-menu" id="tagFilterOptions"></div>
      </div>
      <select class="select" id="statusFilter">
        <option value="">全部狀態</option>
        <option value="todo">待參考</option>
        <option value="done">已拍過</option>
      </select>
      <div class="btn-row toolbar-actions">

<script>
const API_BASE_URL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
  ? 'https://link.yaja168.com/api'
  : '/api';
const API_STATE_URL = `${API_BASE_URL}/state`;
const API_PREVIEW_URL = `${API_BASE_URL}/preview`;
const STORAGE_KEY = 'ig-link-collector-v1';
const CATEGORY_STORAGE_KEY = 'ig-link-categories-v1';
const DEFAULT_CATEGORIES = ['未分類', '拍攝靈感', '腳本', '構圖', '運鏡', '剪輯', '音樂', '商品展示', '競品觀察', '其他'];
const form = document.getElementById('linkForm');
const detailForm = document.getElementById('detailForm');
const detailModal = document.getElementById('detailModal');
const categoryModal = document.getElementById('categoryModal');
const detailId = document.getElementById('detailId');
const urlInput = document.getElementById('urlInput');
const detailUrl = document.getElementById('detailUrl');
const titleInput = document.getElementById('titleInput');
const categoryInput = document.getElementById('categoryInput');
const statusInput = document.getElementById('statusInput');
const noteInput = document.getElementById('noteInput');
const detailTagList = document.getElementById('detailTagList');
const newTagInput = document.getElementById('newTagInput');
const searchInput = document.getElementById('searchInput');
const filterToggle = document.getElementById('filterToggle');
const filterPanel = document.getElementById('filterPanel');
const categoryFilter = document.getElementById('categoryFilter');
const categoryFilterButton = document.getElementById('categoryFilterButton');
const categoryFilterLabel = document.getElementById('categoryFilterLabel');
const categoryFilterOptions = document.getElementById('categoryFilterOptions');
const tagFilter = document.getElementById('tagFilter');
const tagFilterButton = document.getElementById('tagFilterButton');
const tagFilterLabel = document.getElementById('tagFilterLabel');
const tagFilterOptions = document.getElementById('tagFilterOptions');
const statusFilter = document.getElementById('statusFilter');
const cards = document.getElementById('cards');
const totalCount = document.getElementById('totalCount');
const toastEl = document.getElementById('toast');
const modalOpenLink = document.getElementById('modalOpenLink');
const modalDeleteBtn = document.getElementById('modalDeleteBtn');
const categoryList = document.getElementById('categoryList');
const newCategoryInput = document.getElementById('newCategoryInput');
const categoryManagerTab = document.getElementById('categoryManagerTab');
const tagManagerTab = document.getElementById('tagManagerTab');
const addManagerItemBtn = document.getElementById('addManagerItemBtn');
const hideDoneBtn = document.getElementById('hideDoneBtn');
let items = [];
let categories = [...DEFAULT_CATEGORIES];
let tags = [];
let selectedCategories = new Set();
let selectedTags = new Set();
let detailTags = new Set();
let hideDone = false;
let filtersOpen = false;
let managerMode = 'category';
let inlineTagEditorId = '';
let saveTimer = null;
let detailSaveTimer = null;
let isServerReady = false;

function loadLocalItems() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    return Array.isArray(saved) ? saved : [];
  } catch {
    return [];
  }
}

function saveItems() {
  return persistState();
}

function loadLocalCategories() {
  try {
    const saved = JSON.parse(localStorage.getItem(CATEGORY_STORAGE_KEY) || '[]');
    const source = Array.isArray(saved) && saved.length ? saved : DEFAULT_CATEGORIES;
    return normalizeCategoryList(source);
  } catch {
    return [...DEFAULT_CATEGORIES];
  }
}

function saveCategories() {
  return persistState();
}

function getLocalState() {
  return {
    items: loadLocalItems(),
    categories: loadLocalCategories(),
    tags: []
  };
}

function normalizeState(state) {
  const nextItems = Array.isArray(state && state.items) ? state.items : [];
  const nextTags = normalizeTagList([
    ...(Array.isArray(state && state.tags) ? state.tags : []),
    ...nextItems.flatMap(item => item.tags || [])
  ]);
  const savedCategories = Array.isArray(state && state.categories) ? state.categories : [];
  const nextCategories = normalizeCategoryList([
    ...(savedCategories.length ? savedCategories : DEFAULT_CATEGORIES),
    ...nextItems.map(item => item.category || '未分類')
  ]);
  return { items: nextItems, categories: nextCategories, tags: nextTags };
}

async function loadServerState() {
  const response = await fetch(API_STATE_URL, { cache: 'no-store' });
  if (!response.ok) throw new Error('load failed');
  return normalizeState(await response.json());
}

async function writeServerState(state) {
  const response = await fetch(API_STATE_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(normalizeState(state))
  });
  if (!response.ok) throw new Error('save failed');
  return normalizeState(await response.json());
}

async function fetchPreview(url) {
  try {
    const response = await fetch(`${API_PREVIEW_URL}?url=${encodeURIComponent(url)}`, { cache: 'no-store' });
    if (!response.ok) return {};
    return await response.json();
  } catch {
    return {};
  }
}

function persistState() {
  if (!isServerReady) return Promise.resolve();
  clearTimeout(saveTimer);
  return new Promise(resolve => {
    saveTimer = setTimeout(async () => {
      try {
        await writeServerState({ items, categories, tags });
        resolve();
      } catch {
        showToast('伺服器保存失敗，請稍後再試');
        resolve();
      }
    }, 120);
  });
}

function normalizeCategoryList(list) {
  const normalized = list.map(category => String(category || '').trim()).filter(Boolean);
  return [...new Set(['未分類', ...normalized])];
}

function normalizeTagList(list) {
  return [...new Set((Array.isArray(list) ? list : [])
    .map(tag => String(tag || '').trim())
    .filter(Boolean))];
}

function uid() {
  return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
}

function normalizeTags(value) {
  const source = Array.isArray(value) ? value.join(',') : String(value || '');
  return source
    .split(/[,，\s]+/)
    .map(tag => tag.trim())
    .filter(Boolean)
    .filter((tag, index, arr) => arr.indexOf(tag) === index);
}

function esc(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function jsArg(value) {
  return JSON.stringify(String(value || '')).replace(/</g, '\\u003c');
}

function getHost(url) {
  try {
    return new URL(url).hostname.replace(/^www\./, '');
  } catch {
    return '';
  }
}

function getSourceLabel(url) {
  const host = getHost(url);
  if (/(^|\.)instagram\.com$/i.test(host)) return 'IG';
  if (/(^|\.)facebook\.com$/i.test(host) || /(^|\.)fb\.com$/i.test(host)) return 'FB';
  return host || 'link';
}

function normalizeUrl(value) {
  const raw = String(value || '').trim();
  if (!raw) return '';
  if (/^https?:\/\//i.test(raw)) return raw;
  return `https://${raw}`;
}

function isValidUrl(value) {
  try {
    new URL(value);
    return true;
  } catch {
    return false;
  }
}

function inferTitle(url) {
  try {
    const parsed = new URL(url);
    const parts = parsed.pathname.split('/').filter(Boolean);
    if (parsed.hostname.includes('instagram.com')) {
      if (parts[0] === 'reel') return `Reels ${parts[1] || ''}`.trim();
      if (parts[0] === 'p') return `貼文 ${parts[1] || ''}`.trim();
      if (parts[0]) return `@${parts[0]}`;
    }
    return parsed.hostname.replace(/^www\./, '');
  } catch {
    return '未命名連結';
  }
}

function isInstagramProfileUrl(url) {
  try {
    const parsed = new URL(url);
    const host = parsed.hostname.replace(/^www\./, '');
    const parts = parsed.pathname.split('/').filter(Boolean);
    const reserved = new Set([
      'p',
      'reel',
      'reels',
      'stories',
      'explore',
      'accounts',
      'direct',
      'tv'
    ]);
    return host === 'instagram.com' && parts.length === 1 && !reserved.has(parts[0].toLowerCase());
  } catch {
    return false;
  }
}

function isOrganized(item) {
  return item.category !== '未分類' || (item.tags || []).length > 0 || Boolean(item.note);
}

function updateResetButton() {
  document.getElementById('resetBtn').classList.toggle('hidden', !urlInput.value.trim());
}

form.addEventListener('submit', async event => {
  event.preventDefault();
  const url = normalizeUrl(urlInput.value);
  if (!url) {
    showToast('請貼上連結');
    return;
  }
  if (!isValidUrl(url)) {
    showToast('連結格式不對');
    return;
  }

  const duplicate = items.find(item => item.url === url);
  if (duplicate) {
    showToast('這個連結已經保存過');
    openDetail(duplicate.id);
    return;
  }

  showToast('保存中');
  const preview = await fetchPreview(url);
  const item = {
    id: uid(),
    url,
    title: preview.title || inferTitle(url),
    category: '未分類',
    status: 'todo',
    tags: isInstagramProfileUrl(url) ? ['寶藏帳號'] : [],
    note: '',
    thumbnailUrl: preview.thumbnailUrl || '',
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  items.unshift(item);
  await saveItems();
  form.reset();
  updateResetButton();
  render();
  showToast('已先保存');
  urlInput.focus();
});

detailForm.addEventListener('submit', event => {
  event.preventDefault();
  saveDetailNow();
});

async function saveDetailNow() {
  const id = detailId.value;
  const existing = items.find(item => item.id === id);
  if (!existing) return;
  const normalizedDetailUrl = normalizeUrl(detailUrl.value);
  if (!isValidUrl(normalizedDetailUrl)) {
    showToast('連結格式不對');
    return;
  }

  const urlChanged = normalizedDetailUrl !== existing.url;
  const preview = urlChanged ? await fetchPreview(normalizedDetailUrl) : {};
  const updated = {
    ...existing,
    url: normalizedDetailUrl,
    title: titleInput.value.trim() || preview.title || inferTitle(normalizedDetailUrl),
    category: categoryInput.value,
    status: statusInput.value,
    tags: [...detailTags],
    note: noteInput.value.trim(),
    thumbnailUrl: urlChanged ? (preview.thumbnailUrl || '') : (existing.thumbnailUrl || ''),
    updatedAt: Date.now()
  };
  items = items.map(item => item.id === id ? updated : item);
  tags = normalizeTagList([...tags, ...detailTags]);
  await saveItems();
  render();
  showToast('已自動保存');
}

function scheduleDetailSave(delay = 500) {
  clearTimeout(detailSaveTimer);
  detailSaveTimer = setTimeout(() => saveDetailNow(), delay);
}

document.getElementById('resetBtn').addEventListener('click', () => {
  form.reset();
  updateResetButton();
  urlInput.focus();
});
urlInput.addEventListener('input', updateResetButton);
searchInput.addEventListener('input', render);
statusFilter.addEventListener('change', render);
filterToggle.addEventListener('click', () => {
  filtersOpen = !filtersOpen;
  filterPanel.classList.toggle('collapsed', !filtersOpen);
  filterToggle.setAttribute('aria-expanded', String(filtersOpen));
  filterToggle.textContent = filtersOpen ? '⌃' : '⌄';
  filterToggle.setAttribute('aria-label', filtersOpen ? '收合篩選' : '展開篩選');
  filterToggle.title = filtersOpen ? '收合篩選' : '展開篩選';
});
detailUrl.addEventListener('blur', () => scheduleDetailSave(0));
titleInput.addEventListener('input', () => scheduleDetailSave());
categoryInput.addEventListener('change', () => scheduleDetailSave(0));
statusInput.addEventListener('change', () => scheduleDetailSave(0));
noteInput.addEventListener('input', () => scheduleDetailSave());
hideDoneBtn.addEventListener('click', () => {
  hideDone = !hideDone;
  render();
});
document.getElementById('manageCategoriesBtn').addEventListener('click', openCategoryManager);
addManagerItemBtn.addEventListener('click', addManagerItem);
categoryManagerTab.addEventListener('click', () => setManagerMode('category'));
tagManagerTab.addEventListener('click', () => setManagerMode('tag'));
document.getElementById('addTagBtn').addEventListener('click', addDetailTag);
newCategoryInput.addEventListener('keydown', event => {
  if (event.key === 'Enter') {
    event.preventDefault();
    addManagerItem();
  }
});
newTagInput.addEventListener('keydown', event => {
  if (event.key === 'Enter') {
    event.preventDefault();
    addDetailTag();
  }
});
detailTagList.addEventListener('click', event => {
  const remove = event.target.closest('[data-delete-tag]');
  if (remove) {
    event.stopPropagation();
    deleteTag(remove.dataset.deleteTag);
    return;
  }
  const toggle = event.target.closest('[data-toggle-tag]');
  if (toggle) toggleDetailTag(toggle.dataset.toggleTag);
});
categoryFilterButton.addEventListener('click', () => {
  const open = categoryFilter.classList.toggle('open');
  categoryFilterButton.setAttribute('aria-expanded', String(open));
  tagFilter.classList.remove('open');
  tagFilterButton.setAttribute('aria-expanded', 'false');
});
categoryFilterOptions.addEventListener('click', event => {
  event.stopPropagation();
  const option = event.target.closest('[data-filter-category]');
  if (option) toggleCategoryFilter(option.dataset.filterCategory);
});
tagFilterButton.addEventListener('click', () => {
  const open = tagFilter.classList.toggle('open');
  tagFilterButton.setAttribute('aria-expanded', String(open));
  categoryFilter.classList.remove('open');
  categoryFilterButton.setAttribute('aria-expanded', 'false');
});
tagFilterOptions.addEventListener('click', event => {
  event.stopPropagation();
  const option = event.target.closest('[data-filter-tag]');
  if (option) toggleTagFilter(option.dataset.filterTag);
});
cards.addEventListener('click', event => {
  const option = event.target.closest('[data-inline-tag-option]');
  if (option) {
    event.preventDefault();
    toggleInlineTag(option.dataset.inlineTagId, option.dataset.inlineTagValue);
  }
});
categoryList.addEventListener('click', event => {
  const categoryButton = event.target.closest('[data-delete-category]');
  if (categoryButton) {
    deleteCategory(categoryButton.dataset.deleteCategory);
    return;
  }
  const tagButton = event.target.closest('[data-delete-managed-tag]');
  if (tagButton) deleteTag(tagButton.dataset.deleteManagedTag);
});

document.addEventListener('click', event => {
  if (!categoryFilter.contains(event.target)) {
    categoryFilter.classList.remove('open');
    categoryFilterButton.setAttribute('aria-expanded', 'false');
  }
  if (!tagFilter.contains(event.target)) {
    tagFilter.classList.remove('open');
    tagFilterButton.setAttribute('aria-expanded', 'false');
  }
});

document.getElementById('randomBtn').addEventListener('click', () => {
  const pool = items.filter(item => item.status !== 'done');
  if (!pool.length) {
    showToast('目前沒有待參考連結');
    return;
  }
  const item = pool[Math.floor(Math.random() * pool.length)];
  window.open(item.url, '_blank', 'noopener');
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `ig-links-${new Date().toISOString().slice(0, 10)}.json`;
  link.click();
  URL.revokeObjectURL(link.href);
  showToast('已匯出備份');
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', async event => {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const imported = JSON.parse(await file.text());
    if (!Array.isArray(imported)) throw new Error('invalid');
    const cleaned = imported
      .filter(item => item && item.url)
      .map(item => ({
        id: item.id || uid(),
        url: item.url,
        title: item.title || inferTitle(item.url),
        category: item.category || '未分類',
        status: item.status || 'todo',
        tags: Array.isArray(item.tags) ? item.tags : [],
        note: item.note || '',
        thumbnailUrl: item.thumbnailUrl || '',
        createdAt: Number(item.createdAt || Date.now()),
        updatedAt: Number(item.updatedAt || Date.now())
      }));
    items = cleaned.concat(items);
    categories = normalizeCategoryList([...categories, ...cleaned.map(item => item.category)]);
    tags = normalizeTagList([...tags, ...cleaned.flatMap(item => item.tags || [])]);
    await saveCategories();
    await saveItems();
    render();
    showToast(`已匯入 ${cleaned.length} 筆`);
  } catch {
    showToast('匯入失敗，檔案格式不正確');
  }
  event.target.value = '';
});

modalDeleteBtn.addEventListener('click', () => {
  removeItem(detailId.value);
});

function openDetail(id) {
  const item = items.find(entry => entry.id === id);
  if (!item) return;
  if (!categories.includes(item.category || '未分類')) {
    categories = normalizeCategoryList([...categories, item.category || '未分類']);
    saveCategories();
  }
  renderCategorySelect(item.category || '未分類');
  tags = getAllTags();
  detailTags = new Set(item.tags || []);
  detailId.value = item.id;
  detailUrl.value = item.url;
  titleInput.value = item.title || inferTitle(item.url);
  categoryInput.value = item.category || '未分類';
  statusInput.value = item.status || 'todo';
  renderDetailTags();
  newTagInput.value = '';
  noteInput.value = item.note || '';
  modalOpenLink.href = item.url;
  detailModal.classList.add('open');
  setTimeout(() => titleInput.focus(), 80);
}

function closeDetail() {
  clearTimeout(detailSaveTimer);
  saveDetailNow();
  detailModal.classList.remove('open');
}

function closeModalOnBackdrop(event) {
  if (event.target === detailModal) closeDetail();
}

function openCategoryManager() {
  setManagerMode(managerMode);
  renderCategoryManager();
  categoryModal.classList.add('open');
  setTimeout(() => newCategoryInput.focus(), 80);
}

function closeCategoryManager() {
  categoryModal.classList.remove('open');
}

function closeCategoryModalOnBackdrop(event) {
  if (event.target === categoryModal) closeCategoryManager();
}

function setManagerMode(mode) {
  managerMode = mode === 'tag' ? 'tag' : 'category';
  const isTag = managerMode === 'tag';
  categoryManagerTab.classList.toggle('active', !isTag);
  tagManagerTab.classList.toggle('active', isTag);
  categoryManagerTab.setAttribute('aria-selected', String(!isTag));
  tagManagerTab.setAttribute('aria-selected', String(isTag));
  newCategoryInput.placeholder = isTag ? '新增標籤' : '新增分類';
  newCategoryInput.value = '';
  renderCategoryManager();
  newCategoryInput.focus();
}

function addManagerItem() {
  if (managerMode === 'tag') {
    addManagedTag();
    return;
  }
  addCategory();
}

async function addCategory() {
  const category = newCategoryInput.value.trim();
  if (!category) return;
  if (categories.includes(category)) {
    showToast('分類已存在');
    newCategoryInput.value = '';
    return;
  }
  categories = normalizeCategoryList([...categories, category]);
  await saveCategories();
  newCategoryInput.value = '';
  render();
  renderCategoryManager();
  showToast('已新增分類');
}

async function addManagedTag() {
  const tag = newCategoryInput.value.trim();
  if (!tag) return;
  if (getAllTags().includes(tag)) {
    showToast('標籤已存在');
    newCategoryInput.value = '';
    return;
  }
  tags = normalizeTagList([...tags, tag]);
  await saveItems();
  newCategoryInput.value = '';
  render();
  renderCategoryManager();
  showToast('已新增標籤');
}

async function deleteCategory(category) {
  if (category === '未分類') {
    showToast('未分類不能刪除');
    return;
  }
  const used = items.filter(item => item.category === category).length;
  const message = used
    ? `刪除「${category}」？${used} 筆連結會改為未分類。`
    : `刪除「${category}」？`;
  if (!confirm(message)) return;
  categories = categories.filter(item => item !== category);
  items = items.map(item => item.category === category ? { ...item, category: '未分類', updatedAt: Date.now() } : item);
  selectedCategories.delete(category);
  await saveCategories();
  await saveItems();
  render();
  renderCategoryManager();
  showToast('已刪除分類');
}

async function removeItem(id) {
  const item = items.find(entry => entry.id === id);
  if (!item || !confirm(`確定刪除「${item.title || item.url}」？`)) return;
  items = items.filter(entry => entry.id !== id);
  await saveItems();
  closeDetail();
  render();
  showToast('已刪除');
}

async function toggleStatus(id) {
  items = items.map(item => {
    if (item.id !== id) return item;
    return { ...item, status: item.status === 'done' ? 'todo' : 'done', updatedAt: Date.now() };
  });
  await saveItems();
  render();
}

function copyUrl(id) {
  const item = items.find(entry => entry.id === id);
  if (!item) return;
  navigator.clipboard.writeText(item.url).then(
    () => showToast('已複製連結'),
    () => showToast('複製失敗')
  );
}

function beginTitleEdit(event, id) {
  event.stopPropagation();
  const item = items.find(entry => entry.id === id);
  const title = event.currentTarget.closest('.card-title');
  if (!item || !title || title.querySelector('input')) return;

  const input = document.createElement('input');
  input.className = 'title-edit-input';
  input.type = 'text';
  input.value = item.title || inferTitle(item.url);
  title.replaceChildren(input);
  input.focus();
  input.select();

  let done = false;
  const commit = async shouldSave => {
    if (done) return;
    done = true;
    const nextTitle = input.value.trim();
    if (shouldSave && nextTitle && nextTitle !== item.title) {
      items = items.map(entry => entry.id === id
        ? { ...entry, title: nextTitle, updatedAt: Date.now() }
        : entry);
      await saveItems();
      showToast('標題已更新');
    }
    render();
  };

  input.addEventListener('blur', () => commit(true));
  input.addEventListener('keydown', event => {
    if (event.key === 'Enter') {
      event.preventDefault();
      input.blur();
    }
    if (event.key === 'Escape') {
      event.preventDefault();
      commit(false);
    }
  });
}

function beginCategoryEdit(event, id) {
  event.stopPropagation();
  const item = items.find(entry => entry.id === id);
  const target = event.currentTarget;
  if (!item || target.querySelector('select')) return;

  const select = document.createElement('select');
  select.className = 'badge-select';
  const rect = target.getBoundingClientRect();
  select.style.width = `${Math.ceil(rect.width)}px`;
  select.style.height = `${Math.max(24, Math.ceil(rect.height))}px`;
  getAllCategories().forEach(category => {
    const option = document.createElement('option');
    option.value = category;
    option.textContent = category;
    select.append(option);
  });
  select.value = item.category || '未分類';
  target.replaceWith(select);
  select.focus();

  const commit = async shouldSave => {
    const nextCategory = select.value || '未分類';
    if (shouldSave && nextCategory !== item.category) {
      items = items.map(entry => entry.id === id
        ? { ...entry, category: nextCategory, updatedAt: Date.now() }
        : entry);
      categories = normalizeCategoryList([...categories, nextCategory]);
      await saveItems();
      showToast('分類已更新');
    }
    render();
  };

  select.addEventListener('change', () => commit(true));
  select.addEventListener('blur', () => commit(false));
}

function toggleCategoryFilter(category) {
  if (category === '__all__') {
    selectedCategories.clear();
  } else if (selectedCategories.has(category)) {
    selectedCategories.delete(category);
  } else {
    selectedCategories.add(category);
  }
  render();
}

function toggleTagFilter(tag) {
  if (tag === '__all__') {
    selectedTags.clear();
  } else if (selectedTags.has(tag)) {
    selectedTags.delete(tag);
  } else {
    selectedTags.add(tag);
  }
  render();
}

function openInlineTagEditor(id) {
  inlineTagEditorId = inlineTagEditorId === id ? '' : id;
  render();
}

function closeInlineTagEditor() {
  inlineTagEditorId = '';
  render();
}

async function toggleInlineTag(id, tag) {
  const item = items.find(entry => entry.id === id);
  if (!item) return;
  const currentTags = new Set(item.tags || []);
  if (currentTags.has(tag)) {
    currentTags.delete(tag);
  } else {
    currentTags.add(tag);
  }
  items = items.map(entry => entry.id === id
    ? { ...entry, tags: normalizeTagList([...currentTags]), updatedAt: Date.now() }
    : entry);
  tags = normalizeTagList([...tags, tag]);
  inlineTagEditorId = id;
  await saveItems();
  render();
}

async function addInlineTag(id) {
  const input = document.querySelector(`[data-inline-tag-input="${id}"]`);
  const tag = input ? input.value.trim() : '';
  if (!tag) return;
  const item = items.find(entry => entry.id === id);
  if (!item) return;
  tags = normalizeTagList([...tags, tag]);
  items = items.map(entry => entry.id === id
    ? { ...entry, tags: normalizeTagList([...(entry.tags || []), tag]), updatedAt: Date.now() }
    : entry);
  inlineTagEditorId = id;
  await saveItems();
  render();
}

function handleInlineTagInput(event, id) {
  if (event.key !== 'Enter') return;
  event.preventDefault();
  addInlineTag(id);
}

function getFilteredItems() {
  const q = searchInput.value.trim().toLowerCase();
  return items.filter(item => {
    const blob = [
      item.title,
      item.url,
      item.category,
      item.note,
      ...(item.tags || [])
    ].join(' ').toLowerCase();
    return (!q || blob.includes(q))
      && (!selectedCategories.size || selectedCategories.has(item.category || '未分類'))
      && (!selectedTags.size || (item.tags || []).some(tag => selectedTags.has(tag)))
      && (!hideDone || item.status !== 'done')
      && (!statusFilter.value || item.status === statusFilter.value);
  });
}

function getAllCategories() {
  return normalizeCategoryList([...categories, ...items.map(item => item.category || '未分類')]);
}

function getAllTags() {
  return normalizeTagList([...tags, ...items.flatMap(item => item.tags || [])]);
}

function renderCategorySelect(selected = categoryInput.value || '未分類') {
  const list = getAllCategories();
  categoryInput.innerHTML = list.map(category => `<option>${esc(category)}</option>`).join('');
  categoryInput.value = list.includes(selected) ? selected : '未分類';
}

function renderDetailTags() {
  const list = getAllTags();
  if (!list.length) {
    detailTagList.innerHTML = '<div class="help">目前沒有標籤，先新增一個。</div>';
    return;
  }
  detailTagList.innerHTML = list.map(tag => `
    <button class="tag-choice ${detailTags.has(tag) ? 'active' : ''}" type="button" data-toggle-tag="${esc(tag)}">
      <span>${esc(tag)}</span>
      <span class="tag-remove" data-delete-tag="${esc(tag)}">x</span>
    </button>
  `).join('');
}

function toggleDetailTag(tag) {
  if (detailTags.has(tag)) {
    detailTags.delete(tag);
  } else {
    detailTags.add(tag);
  }
  renderDetailTags();
  scheduleDetailSave(0);
}

async function addDetailTag() {
  const tag = newTagInput.value.trim();
  if (!tag) return;
  tags = normalizeTagList([...tags, tag]);
  detailTags.add(tag);
  newTagInput.value = '';
  renderDetailTags();
  renderFilters();
  await saveDetailNow();
}

async function deleteTag(tag) {
  const used = items.filter(item => (item.tags || []).includes(tag)).length;
  const message = used
    ? `刪除「${tag}」？${used} 筆連結會移除這個標籤。`
    : `刪除「${tag}」？`;
  if (!confirm(message)) return;
  tags = tags.filter(item => item !== tag);
  detailTags.delete(tag);
  selectedTags.delete(tag);
  items = items.map(item => ({
    ...item,
    tags: (item.tags || []).filter(itemTag => itemTag !== tag),
    updatedAt: (item.tags || []).includes(tag) ? Date.now() : item.updatedAt
  }));
  await saveItems();
  renderDetailTags();
  render();
  renderCategoryManager();
}

function renderCategoryManager() {
  if (managerMode === 'tag') {
    renderTagManager();
    return;
  }
  const list = getAllCategories();
  categoryList.innerHTML = list.map(category => {
    const count = items.filter(item => (item.category || '未分類') === category).length;
    const canDelete = category !== '未分類';
    return `
      <div class="category-row">
        <span class="category-name">${esc(category)}</span>
        <span class="category-count">${count} 筆</span>
        <button class="btn btn-danger btn-icon" type="button" ${canDelete ? `data-delete-category="${esc(category)}"` : 'disabled'}>x</button>
      </div>
    `;
  }).join('');
}

function renderTagManager() {
  const list = getAllTags();
  if (!list.length) {
    categoryList.innerHTML = '<div class="manager-empty">目前沒有標籤</div>';
    return;
  }
  categoryList.innerHTML = list.map(tag => {
    const count = items.filter(item => (item.tags || []).includes(tag)).length;
    return `
      <div class="category-row">
        <span class="category-name">${esc(tag)}</span>
        <span class="category-count">${count} 筆</span>
        <button class="btn btn-danger btn-icon" type="button" data-delete-managed-tag="${esc(tag)}">x</button>
      </div>
    `;
  }).join('');
}

function renderInlineTagEditor(item) {
  if (inlineTagEditorId !== item.id) return '';
  const itemTags = new Set(item.tags || []);
  const list = getAllTags();
  const options = list.length
    ? list.map(tag => `
      <button class="tag-choice ${itemTags.has(tag) ? 'active' : ''}" type="button" data-inline-tag-option data-inline-tag-id="${esc(item.id)}" data-inline-tag-value="${esc(tag)}">
        <span>${esc(tag)}</span>
      </button>
    `).join('')
    : '<div class="help">目前沒有標籤，先新增一個。</div>';
  return `
    <div class="inline-tag-editor">
      <button class="btn btn-secondary btn-icon inline-tag-close" type="button" onclick="closeInlineTagEditor()" title="關閉" aria-label="關閉">x</button>
      <div class="inline-tag-options">${options}</div>
      <div class="inline-tag-input">
        <input class="input" type="text" placeholder="新增標籤" data-inline-tag-input="${esc(item.id)}" onkeydown="handleInlineTagInput(event, '${item.id}')">
        <button class="btn btn-primary" type="button" onclick="addInlineTag('${item.id}')">新增</button>
      </div>
    </div>
  `;
}

function renderFilters() {
  categories = getAllCategories();
  const filterCategories = [...categories].sort();
  tags = getAllTags();
  const filterTags = [...tags].sort();
  selectedCategories = new Set([...selectedCategories].filter(category => filterCategories.includes(category)));
  selectedTags = new Set([...selectedTags].filter(tag => filterTags.includes(tag)));
  categoryFilterLabel.textContent = selectedCategories.size
    ? `已選 ${selectedCategories.size} 個分類`
    : '全部分類';
  categoryFilterOptions.innerHTML = `
    <button class="filter-option ${selectedCategories.size ? '' : 'active'}" type="button" data-filter-category="__all__">
      <span>全部分類</span><span class="filter-check">${selectedCategories.size ? '' : '✓'}</span>
    </button>
    ${filterCategories.map(category => `
      <button class="filter-option ${selectedCategories.has(category) ? 'active' : ''}" type="button" data-filter-category="${esc(category)}">
        <span>${esc(category)}</span><span class="filter-check">${selectedCategories.has(category) ? '✓' : ''}</span>
      </button>
    `).join('')}
  `;
  tagFilterLabel.textContent = selectedTags.size
    ? `已選 ${selectedTags.size} 個標籤`
    : '全部標籤';
  tagFilterOptions.innerHTML = filterTags.length
    ? `
      <button class="filter-option ${selectedTags.size ? '' : 'active'}" type="button" data-filter-tag="__all__">
        <span>全部標籤</span><span class="filter-check">${selectedTags.size ? '' : '✓'}</span>
      </button>
      ${filterTags.map(tag => {
        const count = items.filter(item => (item.tags || []).includes(tag)).length;
        return `
          <button class="filter-option ${selectedTags.has(tag) ? 'active' : ''}" type="button" data-filter-tag="${esc(tag)}">
            <span>${esc(tag)} ${count}</span><span class="filter-check">${selectedTags.has(tag) ? '✓' : ''}</span>
          </button>
        `;
      }).join('')}
    `
    : `
      <button class="filter-option" type="button" disabled>
        <span>目前沒有標籤</span><span class="filter-check"></span>
      </button>
    `;
  renderCategorySelect();
}

function render() {
  renderFilters();
  totalCount.textContent = items.length;
  hideDoneBtn.classList.toggle('active', hideDone);
  hideDoneBtn.textContent = hideDone ? '顯示已拍' : '隱藏已拍';
  const list = getFilteredItems();
  if (!list.length) {
    cards.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div>
          <h2>${items.length ? '找不到符合的連結' : '先貼上第一個 IG 連結'}</h2>
          <p>${items.length ? '換個關鍵字、分類或標籤再試一次。' : '先快速保存，之後點「整理」再補分類、標籤和拍攝備註。'}</p>
        </div>
      </div>
    `;
    return;
  }

  cards.innerHTML = list.map(item => {
    const organized = isOrganized(item);
    const statusText = item.status === 'done' ? '已拍過' : '待參考';
    const noteText = item.note || '';
    const note = noteText ? `<div class="note">${esc(noteText)}</div>` : '';
    const thumbnail = item.thumbnailUrl
      ? `<div class="thumb"><img src="${esc(item.thumbnailUrl)}" alt="" loading="lazy" referrerpolicy="no-referrer"></div>`
      : '';
    return `
      <article class="card">
        ${thumbnail}
        <button class="btn btn-secondary btn-icon copy-float" type="button" onclick="copyUrl('${item.id}')" title="複製連結">⧉</button>
        <div class="card-head">
          <h2 class="card-title">
            <button class="title-edit-trigger" type="button" onclick="beginTitleEdit(event, '${item.id}')" title="點一下修改標題">${esc(item.title || inferTitle(item.url))}</button>
          </h2>
          <div class="meta">
            <button class="badge badge-button ${organized ? 'category' : 'raw'}" type="button" onclick="beginCategoryEdit(event, '${item.id}')" title="點一下修改分類">${esc(item.category || '未分類')}</button>
            <button class="badge badge-button ${item.status === 'done' ? 'done' : 'todo'}" type="button" onclick="toggleStatus('${item.id}')" title="點一下更新狀態">${statusText}</button>
            <span class="badge">${esc(getSourceLabel(item.url))}</span>
          </div>
        </div>
        <div class="card-body">
          ${note}
          <div class="tags">
            ${(item.tags || []).map(tag => `<button class="tag" type="button" onclick="toggleTagFilter(${jsArg(tag)})">${esc(tag)}</button>`).join('')}
            <button class="tag tag-add" type="button" onclick="openInlineTagEditor('${item.id}')" title="新增標籤" aria-label="新增標籤">+</button>
          </div>
          ${renderInlineTagEditor(item)}
          <div class="card-actions">
            <a class="btn btn-primary" href="${esc(item.url)}" target="_blank" rel="noopener" title="開啟" aria-label="開啟">▶</a>
            <button class="btn btn-secondary btn-icon organize-btn" type="button" onclick="openDetail('${item.id}')" title="整理" aria-label="整理">⚙</button>
          </div>
        </div>
      </article>
    `;
  }).join('');
}

function showToast(message) {
  toastEl.textContent = message;
  toastEl.classList.add('show');
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 1800);
}

async function init() {
  cards.innerHTML = `
    <div class="empty" style="grid-column:1/-1">
      <div>
        <h2>正在讀取連結</h2>
        <p>從伺服器同步保存資料。</p>
      </div>
    </div>
  `;

  try {
    const serverState = await loadServerState();
    const localState = getLocalState();
    const hasServerItems = serverState.items.length > 0;
    const hasLocalItems = localState.items.length > 0;

    if (!hasServerItems && hasLocalItems) {
      items = localState.items;
      categories = normalizeCategoryList([...serverState.categories, ...localState.categories, ...items.map(item => item.category)]);
      tags = normalizeTagList([...serverState.tags, ...localState.tags, ...items.flatMap(item => item.tags || [])]);
      isServerReady = true;
      await writeServerState({ items, categories, tags });
      showToast('已改成伺服器保存');
    } else {
      items = serverState.items;
      categories = serverState.categories;
      tags = serverState.tags;
      isServerReady = true;
    }
  } catch {
    const localState = getLocalState();
    items = localState.items;
    categories = localState.categories;
    tags = localState.tags;
    isServerReady = false;
    showToast('連不上伺服器，暫時只顯示本機資料');
  }

  render();
}

document.addEventListener('keydown', event => {
  if (event.key === 'Escape') {
    closeDetail();
    closeCategoryManager();
  }
});

init();
</script>
</body>
</html>
